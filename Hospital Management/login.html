<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Login — MediCore Hospital System</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<style>
:root{
--navy:#0a1628;
--navy-mid:#112240;
--teal:#0e9f8c;
--teal-l:#12c5ae;
--teal-glow:rgba(14,159,140,.18);
--rose:#f43f5e;
--white:#f8fafc;
--g200:#e2e8f0;
--g400:#94a3b8;
--g600:#475569;
--text:#0f172a;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
font-family:'DM Sans',sans-serif;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,var(--navy),var(--navy-mid));
}

/* LOGIN CARD */

.login-card{
background:#fff;
width:100%;
max-width:380px;
border-radius:20px;
padding:40px 30px;
box-shadow:0 20px 60px rgba(0,0,0,0.4);
}

.login-logo{
text-align:center;
margin-bottom:30px;
}

.bicon{
margin:auto;
width:60px;
height:60px;
border-radius:14px;
background:linear-gradient(135deg,var(--teal),var(--teal-l));
display:grid;
place-items:center;
color:white;
font-size:26px;
}

.bname{
font-family:'Syne';
font-weight:800;
font-size:24px;
margin-top:12px;
}

.bsub{
font-size:11px;
color:var(--g400);
letter-spacing:1px;
}

/* FORM */

.fgrid{
display:grid;
gap:14px;
}

.fg{
display:flex;
flex-direction:column;
gap:5px;
}

label{
font-size:11px;
font-weight:600;
color:var(--g600);
}

input{
padding:10px;
border:1px solid var(--g200);
border-radius:9px;
font-size:14px;
}

input:focus{
outline:none;
border-color:var(--teal);
box-shadow:0 0 0 3px var(--teal-glow);
}

/* BUTTON */

.btn{
margin-top:20px;
padding:12px;
border:none;
border-radius:9px;
background:var(--teal);
color:white;
font-size:15px;
cursor:pointer;
width:100%;
}

.btn:hover{
background:var(--teal-l);
}

/* FOOTER */

.login-footer{
text-align:center;
margin-top:20px;
font-size:12px;
color:var(--g400);
}

/* TOAST */

.toast{
position:fixed;
bottom:24px;
right:24px;
background:#0a1628;
color:white;
padding:12px 16px;
border-radius:10px;
opacity:0;
transform:translateY(60px);
transition:0.3s;
}

.toast.show{
opacity:1;
transform:translateY(0);
}

.toast.ok{border-left:4px solid var(--teal)}
.toast.err{border-left:4px solid var(--rose)}

</style>
</head>

<body>

<div class="login-card">

<div class="login-logo">
<div class="bicon"><i class="fa-solid fa-heart-pulse"></i></div>
<div class="bname">MediCore</div>
<div class="bsub">Hospital System</div>
</div>

<form id="login-form">

<div class="fgrid">

<div class="fg">
<label>Username</label>
<input type="text" id="username" placeholder="Enter username" required>
</div>

<div class="fg">
<label>Password</label>
<input type="password" id="password" placeholder="Enter password" required>
</div>

</div>

<button type="submit" class="btn">
<i class="fa-solid fa-right-to-bracket"></i> Sign In
</button>

</form>

<div class="login-footer">
System access demo. Use <b>admin</b> / <b>admin</b>
</div>

</div>

<div class="toast" id="toast"></div>

<script>

function toast(msg,type="ok"){
const t=document.getElementById("toast");
t.innerHTML=msg;
t.className="toast show "+type;
setTimeout(()=>t.classList.remove("show"),3000);
}

document.getElementById("login-form").addEventListener("submit",function(e){

e.preventDefault();

const user=document.getElementById("username").value.trim();
const pass=document.getElementById("password").value.trim();

const validUsers=[
{username:"admin",password:"admin"},
{username:"babu",password:"123456"},
{username:"kaali",password:"123456"},
{username:"abishek",password:"123456"}
];

const valid=validUsers.some(u=>u.username===user && u.password===pass);

if(valid){

toast("Login successful");

setTimeout(()=>{
window.location.href="mainpage.html";
},1000);

}else{

toast("Invalid username or password","err");

}

});

</script>

</body>
</html>
